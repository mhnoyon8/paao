version: "3.9"
services:
  server:
    build: ./server
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=8080
    ports:
      - "8080:8080"
    volumes:
      - ./server/db:/app/server/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 20s
      timeout: 5s
      retries: 5

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:8080}
    ports:
      - "5173:8080"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
